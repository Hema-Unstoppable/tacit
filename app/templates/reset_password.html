{% extends "base.html" %}
{% block title %}Reset password — Tacit{% endblock %}
{% block auth_content %}
<div class="auth-shell">
  <div class="auth-card verify-card">
    <div class="auth-logo">
      <span class="auth-logo-mark">T</span>
    </div>

    <div class="verify-icon">🔒</div>
    <h1 class="auth-title">Choose a new password</h1>
    <p class="auth-sub">This link expires in 1 hour and can only be used once.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/reset-password/{{ token }}" class="mt-4">
      <div class="form-row">
        <label>New password</label>
        <input type="password" name="password" minlength="8" required>
      </div>
      <button class="button full" type="submit">Set new password</button>
    </form>

    <a class="auth-back" href="/login">Back to login</a>
  </div>
</div>
{% endblock %}
